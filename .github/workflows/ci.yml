name: CI

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install, verify and audit
        run: |
          set -Eeuo pipefail
          npm ci
          npm run syntax
          npm test
          npm audit --omit=dev --audit-level=high
