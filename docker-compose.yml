services:
  dsbot:
    build: .
    # Позволяет безопасно запускать отдельный экземпляр для ЦА рядом с Арбатом.
    container_name: ${BOT_CONTAINER_NAME:-dsbot}
    # Переменные берутся из .env (создать из .env.example).
    env_file:
      - ${BOT_ENV_FILE:-.env}
    # Автоперезапуск при падении/перезагрузке сервера.
    restart: unless-stopped
    # Логи переживают пересоздание контейнера.
    volumes:
      - ./logs:/app/logs
    # Бот общается только исходящими запросами (Discord Gateway, Web App, OCR) —
    # порты наружу не нужны.
